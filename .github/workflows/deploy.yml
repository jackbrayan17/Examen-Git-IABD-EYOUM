name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: huggingface-space-deploy
  cancel-in-progress: true

env:
  HF_USERNAME: JackBrayan17
  HF_SPACE: Examen-Git-IABD

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with Git LFS
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Check Hugging Face secret
        id: hf-token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "HF_TOKEN is not configured yet. Deployment is skipped."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to Hugging Face Space
        if: steps.hf-token.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space \
            "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE"

          for attempt in 1 2 3 4 5; do
            echo "Deploy attempt $attempt/5"
            if git push --force space main; then
              echo "Deployment to Hugging Face Space succeeded."
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Deployment failed after 5 attempts."
              exit 1
            fi

            delay=$((attempt * 60))
            echo "Hugging Face returned a temporary error or rate limit. Retrying in ${delay}s..."
            sleep "$delay"
          done
